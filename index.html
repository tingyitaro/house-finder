 {city:'花蓮縣',dist:'花蓮市',addr:'中正路',type:'透天厝',price:380,size:50,rooms:'4房2廳',floor:'全棟3層',unitP:7.6,tags:['山海景','清幽']},
 {city:'台東縣',dist:'台東市',addr:'中正路',type:'透天厝',price:280,size:55,rooms:'4房2廳',floor:'全棟3層',unitP:5.1,tags:['近海','空間大']},
 {city:'苗栗縣',dist:'頭份市',addr:'中正路',type:'透天厝',price:480,size:60,rooms:'4房3廳',floor:'全棟4層',unitP:8.0,tags:['近竹科','透天']},
 {city:'南投縣',dist:'草屯鎮',addr:'中正路',type:'透天厝',price:380,size:65,rooms:'4房3廳',floor:'全棟3層',unitP:5.8,tags:['空氣好','大院子']}
];

const ER={'整層住家':'🏠','獨立套房':'🛋️','雅房':'🛏️'};
const EB={'電梯大樓':'🏢','公寓':'🏘️','透天厝':'🏡'};

let mode='rent',rP=30000,rT='all',bP=10000,bT='all',fK='',sC='',sD=[],aC='',aD=[],pg=1;
const PP=10;

function setMode(m){
  mode=m;pg=1;
  document.getElementById('tog-r').className='tog'+(m==='rent'?' ron':'');
  document.getElementById('tog-b').className='tog'+(m==='buy'?' bon':'');
  buildF();buildP();render();
}

function buildF(){
  const f1=document.getElementById('fr1'),f2=document.getElementById('fr2');
  const rc=`<div class="chip${aC?' sel':''}" onclick="openS()">📍 <span id="rt">${aC?(aD.length?aC+'·'+aD.length+'區':aC):'選擇地區'}</span> ▾</div>`;
  if(mode==='rent'){
    f1.innerHTML=rc+
      `<div class="chip${rP===30000?' ron':''}" onclick="setRP(30000)">三萬以下</div>`+
      `<div class="chip${rP===20000?' ron':''}" onclick="setRP(20000)">兩萬以下</div>`+
      `<div class="chip${rP===15000?' ron':''}" onclick="setRP(15000)">一萬五以下</div>`+
      `<div class="chip${rP===10000?' ron':''}" onclick="setRP(10000)">一萬以下</div>`;
    f2.innerHTML=
      `<div class="chip${rT==='all'?' ron':''}" onclick="setRT('all')">全部房型</div>`+
      `<div class="chip${rT==='整層住家'?' ron':''}" onclick="setRT('整層住家')">🏠 整層住家</div>`+
      `<div class="chip${rT==='獨立套房'?' ron':''}" onclick="setRT('獨立套房')">🛋 套房</div>`+
      `<div class="chip${rT==='雅房'?' ron':''}" onclick="setRT('雅房')">🛏 雅房</div>`;
    document.getElementById('sl2').textContent='平均租金';
    document.getElementById('sl3').textContent='最低租金';
  } else {
    f1.innerHTML=rc+
      `<div class="chip${bP===10000?' bon':''}" onclick="setBP(10000)">不限總價</div>`+
      `<div class="chip${bP===500?' bon':''}" onclick="setBP(500)">500萬以下</div>`+
      `<div class="chip${bP===800?' bon':''}" onclick="setBP(800)">800萬以下</div>`+
      `<div class="chip${bP===1200?' bon':''}" onclick="setBP(1200)">1200萬以下</div>`+
      `<div class="chip${bP===2000?' bon':''}" onclick="setBP(2000)">2000萬以下</div>`;
    f2.innerHTML=
      `<div class="chip${bT==='all'?' bon':''}" onclick="setBT('all')">全部類型</div>`+
      `<div class="chip${bT==='電梯大樓'?' bon':''}" onclick="setBT('電梯大樓')">🏢 電梯大樓</div>`+
      `<div class="chip${bT==='公寓'?' bon':''}" onclick="setBT('公寓')">🏘 公寓</div>`+
      `<div class="chip${bT==='透天厝'?' bon':''}" onclick="setBT('透天厝')">🏡 透天厝</div>`;
    document.getElementById('sl2').textContent='平均總價';
    document.getElementById('sl3').textContent='最低總價';
  }
}

function buildP(){
  document.getElementById('plbl').textContent=mode==='rent'?'即時租屋平台':'即時買房平台';
  document.getElementById('prow').innerHTML=mode==='rent'
    ?`<a class="pc" href="https://rent.591.com.tw/" target="_blank">🏠 591租屋</a><a class="pc" href="https://www.rakuya.com.tw/rent/" target="_blank">🏡 樂屋網</a><a class="pc" href="https://www.housefun.com.tw/rent" target="_blank">🔑 好房網</a><a class="pc" href="https://lvr.land.moi.gov.tw/" target="_blank">📋 實價登錄</a>`
    :`<a class="pc" href="https://sale.591.com.tw/" target="_blank">🏢 591買屋</a><a class="pc" href="https://www.sinyi.com.tw/buy/" target="_blank">🏠 信義房屋</a><a class="pc" href="https://www.yungching.com.tw/buy" target="_blank">🔑 永慶房屋</a><a class="pc" href="https://lvr.land.moi.gov.tw/" target="_blank">📋 實價登錄</a>`;
}

function setRP(p){rP=p;pg=1;buildF();render();}
function setRT(t){rT=t;pg=1;buildF();render();}
function setBP(p){bP=p;pg=1;buildF();render();}
function setBT(t){bT=t;pg=1;buildF();render();}
function onI(el){fK=el.value.trim().toLowerCase();pg=1;render();}

function fil(){
  const src=mode==='rent'?RENT:BUY;
  return src.filter(d=>{
    if(mode==='rent'){if(d.price>rP)return false;if(rT!=='all'&&d.type!==rT)return false;}
    else{if(bP!==10000&&d.price>bP)return false;if(bT!=='all'&&d.type!==bT)return false;}
    if(aC&&d.city!==aC)return false;
    if(aD.length&&!aD.includes(d.dist))return false;
    if(fK&&!(d.city+d.dist+d.addr+d.tags.join('')).toLowerCase().includes(fK))return false;
    return true;
  });
}

function render(){
  const data=fil(),total=data.length,prices=data.map(d=>d.price);
  const avg=total?Math.round(prices.reduce((a,b)=>a+b,0)/total):0;
  const min=total?Math.min(...prices):0;
  const cities=[...new Set(data.map(d=>d.city))].length;
  const ib=mode==='buy';
  document.getElementById('sc').textContent=total;
  document.getElementById('s1').textContent=total||'—';
  document.getElementById('s2').textContent=avg?(ib?avg+'萬':'$'+(avg/1000).toFixed(1)+'k'):'—';
  document.getElementById('s3').textContent=min?(ib?min+'萬':'$'+(min/1000).toFixed(1)+'k'):'—';
  document.getElementById('s4').textContent=cities||'—';
  ['s1','s2','s3','s4'].forEach(id=>{document.getElementById(id).className=ib?'sn b':'sn';});
  const paged=data.slice(0,pg*PP),el=document.getElementById('cards');
  if(!paged.length){el.innerHTML='<div class="empty"><div class="ei">🔍</div><p>找不到符合條件的物件<br>請放寬篩選條件</p></div>';document.getElementById('mw').innerHTML='';return;}
  el.innerHTML=paged.map((d,i)=>{
    const em=ib?(EB[d.type]||'🏠'):(ER[d.type]||'🏘️');
    const ps=ib?d.price+'萬':'$'+d.price.toLocaleString();
    const pu=ib?'總價':'/月';
    const extra=ib?`<span class="up">${d.unitP}萬/坪</span>`:'';
    const href=ib?`https://sale.591.com.tw/?keyword=${encodeURIComponent(d.city+d.dist)}`:`https://rent.591.com.tw/?keyword=${encodeURIComponent(d.city+d.dist)}&price=0,${rP}`;
    return`<div class="card${ib?' bc':''}" style="animation-delay:${(i%PP)*.04}s"><div class="cm"><div class="th${ib?' bt':''}"><div class="em">${em}</div><div class="tl">${d.type}</div></div><div class="ci"><div class="pr"><span class="price${ib?' b':''}">${ps}</span><span class="pu">${pu}</span></div><div class="addr">${d.city} ${d.dist} ${d.addr}</div><div class="meta"><span>🏢${d.floor}</span><span>📐${d.size}坪</span><span>🛏${d.rooms}</span></div></div></div><div class="cf"><div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}${extra}</div><a class="go${ib?' b':''}" href="${href}" target="_blank">找類似 →</a></div></div>`;
  }).join('');
  const mw=document.getElementById('mw');
  mw.innerHTML=paged.length<total?`<div class="more" onclick="pg++;render()">載入更多（還有 ${total-paged.length} 筆）</div>`:`<div style="text-align:center;padding:16px;font-size:.7rem;color:var(--mu)">— 已顯示全部 ${total} 筆 —</div>`;
}

function openS(){sC=aC;sD=[...aD];bldS();document.getElementById('sh').classList.add('open');document.getElementById('bd').classList.add('open');}
function closeS(){document.getElementById('sh').classList.remove('open');document.getElementById('bd').classList.remove('open');}
function clrR(){sC='';sD=[];bldS();}
function cfmR(){aC=sC;aD=[...sD];pg=1;buildF();closeS();render();}
function bldS(){
  const src=mode==='rent'?RENT:BUY;
  const cnt=c=>src.filter(d=>d.city===c).length;
  let h='';
  for(const[r,cs]of Object.entries(RG)){
    const btns=Object.keys(cs).map(c=>{const n=cnt(c);if(!n)return'';return`<div class="cb${sC===c?' sel':''}" onclick="selC('${c}')"><div class="cn">${c}</div><div class="cc">${n}筆</div></div>`;}).join('');
    if(btns.replace(/<div/g,'').length>0)h+=`<div class="rg"><div class="rgt">${r}</div><div class="cg">${btns}</div></div>`;
  }
  if(sC){const ds=Object.values(RG).flatMap(r=>r[sC]||[]);if(ds.length){h+=`<div class="ds"><div class="dt">${sC} 行政區（可多選）</div><div class="dg">${ds.map(d=>`<div class="db${sD.includes(d)?' sel':''}" onclick="togD('${d}')">${d}</div>`).join('')}</div></div>`;}}
  document.getElementById('sbd').innerHTML=h;
}
function selC(c){sC=sC===c?'':c;sD=[];bldS();setTimeout(()=>{const ds=document.querySelector('.ds');if(ds)ds.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function togD(d){const i=sD.indexOf(d);i===-1?sD.push(d):sD.splice(i,1);bldS();}

buildF();buildP();render();
</script>

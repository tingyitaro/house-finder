<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="低價找房">
<link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/391/house_1f3e0.png">
<title>低價找房</title>
<style>
:root{--bg:#0d1b2a;--s:#162436;--s2:#1e3048;--bd:#2a3f55;--ac:#f0a500;--tx:#e8e2d8;--mu:#6a7f92;--cd:#172538;--bl:#3a7bd5}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden}
.hd{flex-shrink:0;padding:calc(env(safe-area-inset-top,44px) + 4px) 16px 12px;background:var(--bg)}
.logo{font-size:1.25rem;font-weight:700;margin-bottom:2px}.logo em{color:var(--ac);font-style:normal}
.tagline{font-size:.72rem;color:var(--mu);margin-bottom:12px}
.toggle{display:flex;background:var(--s2);border-radius:12px;padding:3px;border:1px solid var(--bd)}
.tog{flex:1;padding:9px;border-radius:9px;text-align:center;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--mu);transition:all .2s}
.tog.ron{background:var(--ac);color:#0d1b2a}.tog.bon{background:var(--bl);color:#fff}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom,20px)+24px);scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.sec{padding:16px 16px 0}
.sec-t{font-size:.67rem;color:var(--mu);letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s);color:var(--mu);font-size:.78rem;cursor:pointer;transition:all .15s}
.chip.ron{background:var(--ac);color:#0d1b2a;border-color:var(--ac);font-weight:700}
.chip.bon{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700}
.cprice{display:flex;align-items:center;gap:8px;margin-top:10px}
.cw{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;display:flex;align-items:center;padding:0 10px;transition:border-color .2s}
.cw:focus-within{border-color:var(--ac)}
.cp{font-size:.75rem;color:var(--mu)}
.cw input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:.9rem;padding:10px 4px;width:0}
.cu{font-size:.7rem;color:var(--mu);white-space:nowrap}
.csep{color:var(--mu);font-size:1rem;flex-shrink:0}
.rbtn{margin-top:10px;width:100%;padding:13px 16px;background:var(--s);border:1.5px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}
.rbtn:active{background:var(--s2)}.rbtn.has{border-color:var(--ac)}
.rl{display:flex;align-items:center;gap:10px}
.rname{font-size:.85rem;font-weight:500}.rname.has{color:var(--ac)}
.rsub{font-size:.7rem;color:var(--mu);margin-top:1px}
.sumcard{margin:16px;background:var(--s);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.sum-hd{padding:11px 16px;font-size:.67rem;color:var(--mu);letter-spacing:.08em;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.sum-body{padding:10px 16px 12px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.sk{font-size:.78rem;color:var(--mu)}.sv{font-size:.82rem;font-weight:600;color:var(--tx)}
.sv.ac{color:var(--ac)}.sv.bl{color:#7aaaff}
.plat-sec{padding:0 16px 24px}
.plat-title{font-size:.67rem;color:var(--mu);letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-bottom:10px}
.plat-list{display:flex;flex-direction:column;gap:9px}
.plat-card{background:var(--cd);border:1px solid var(--bd);border-radius:14px;overflow:hidden;text-decoration:none;display:block;transition:all .15s}
.plat-card:active{transform:scale(.98)}
.plat-card.featured{border-color:rgba(240,165,0,.35);background:linear-gradient(135deg,rgba(240,165,0,.08),transparent)}
.plat-card.featured.buy{border-color:rgba(58,123,213,.35);background:linear-gradient(135deg,rgba(58,123,213,.08),transparent)}
.plat-inner{padding:13px 15px;display:flex;align-items:center;gap:12px}
.plat-icon{font-size:1.5rem;flex-shrink:0}
.plat-info{flex:1;min-width:0}
.plat-name{font-size:.9rem;font-weight:700;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:7px}
.pbadge{font-size:.6rem;padding:2px 7px;border-radius:5px;font-weight:600}
.br{background:rgba(240,165,0,.15);color:var(--ac)}
.bb{background:rgba(58,123,213,.15);color:#7aaaff}
.bg{background:rgba(34,160,96,.15);color:#50d090}
.plat-desc{font-size:.72rem;color:var(--mu);line-height:1.4}
.plat-note{font-size:.65rem;color:#50d090;margin-top:3px}
.plat-arrow{color:var(--mu);font-size:1rem;flex-shrink:0}
.plat-params{padding:0 15px 12px;display:flex;flex-wrap:wrap;gap:5px}
.ptag{border-radius:6px;padding:3px 8px;font-size:.65rem}
.ptag.ac{border:1px solid rgba(240,165,0,.3);color:var(--ac);background:rgba(240,165,0,.08)}
.ptag.bl{border:1px solid rgba(58,123,213,.3);color:#7aaaff;background:rgba(58,123,213,.08)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.backdrop.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;z-index:101;transform:translateX(-50%) translateY(105%);width:100%;max-width:430px;background:var(--s);border-radius:18px 18px 0 0;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:82dvh;display:flex;flex-direction:column}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sh{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.shd{padding:12px 18px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shd h2{font-size:.95rem;font-weight:700}.shd p{font-size:.7rem;color:var(--mu);margin-top:2px}
.sbd{overflow-y:auto;flex:1;padding:14px 16px}
.sft{padding:10px 16px;padding-bottom:calc(env(safe-area-inset-bottom,20px)+10px);border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--s);flex-shrink:0}
.bclr{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);font-size:.85rem;cursor:pointer}
.bok{flex:2;padding:12px;border-radius:10px;border:none;background:var(--ac);color:#0d1b2a;font-size:.85rem;font-weight:700;cursor:pointer}
.rg{margin-bottom:16px}.rgt{font-size:.62rem;color:var(--mu);letter-spacing:.1em;font-weight:600;margin-bottom:8px;text-transform:uppercase}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cb{background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s}
.cb.sel{background:rgba(240,165,0,.12);border-color:var(--ac)}
.cn{font-size:.78rem;color:var(--tx);font-weight:500;margin-bottom:1px}.cc{font-size:.58rem;color:var(--mu)}.cb.sel .cn{color:var(--ac)}
.ds{border-top:1px solid var(--bd);padding-top:12px;margin-top:4px}
.dt{font-size:.62rem;color:var(--mu);letter-spacing:.08em;margin-bottom:8px}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.db{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 2px;font-size:.68rem;color:var(--mu);text-align:center;cursor:pointer;transition:all .15s}
.db.sel{background:rgba(240,165,0,.12);border-color:var(--ac);color:var(--ac);font-weight:500}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <div class="logo">低價<em>找房</em></div>
  <div class="tagline">設定條件，一鍵跳轉各大平台查詢真實物件</div>
  <div class="toggle">
    <div class="tog ron" id="tog-r" onclick="setMode('rent')">🏠 租屋</div>
    <div class="tog" id="tog-b" onclick="setMode('buy')">🔑 買房</div>
  </div>
</div>
<div class="scroll">
  <div class="sec">
    <div class="sec-t" id="price-title">💰 租金範圍</div>
    <div class="chips" id="price-chips"></div>
    <div class="cprice">
      <div class="cw"><span class="cp">$</span><input type="number" id="pmin" placeholder="最低" inputmode="numeric" oninput="onCP()"><span class="cu" id="suf1">元</span></div>
      <span class="csep">—</span>
      <div class="cw"><span class="cp">$</span><input type="number" id="pmax" placeholder="最高" inputmode="numeric" oninput="onCP()"><span class="cu" id="suf2">元</span></div>
    </div>
  </div>
  <div class="sec" style="margin-top:4px">
    <div class="sec-t" id="type-title">🏠 房屋類型</div>
    <div class="chips" id="type-chips"></div>
  </div>
  <div class="sec" style="margin-top:4px">
    <div class="sec-t">📍 地區</div>
    <div class="rbtn" id="rbtn" onclick="openS()">
      <div class="rl">
        <span style="font-size:1.1rem">📍</span>
        <div><div class="rname" id="rname">選擇縣市 / 行政區</div><div class="rsub" id="rsub">不選則搜尋全台灣</div></div>
      </div>
      <span style="color:var(--mu)">›</span>
    </div>
  </div>
  <div class="sumcard">
    <div class="sum-hd">目前篩選條件</div>
    <div class="sum-body" id="sum-body"></div>
  </div>
  <div class="plat-sec">
    <div class="plat-title">點選平台直接查詢（條件已自動帶入）</div>
    <div class="plat-list" id="plat-list"></div>
  </div>
</div>
</div>
<div class="backdrop" id="bd" onclick="closeS()"></div>
<div class="sheet" id="sh">
  <div class="sh"></div>
  <div class="shd"><h2>選擇縣市 / 行政區</h2><p>先點縣市，再選行政區（可多選）</p></div>
  <div class="sbd" id="sbd"></div>
  <div class="sft">
    <button class="bclr" onclick="clrR()">清除</button>
    <button class="bok" onclick="cfmR()">確認</button>
  </div>
</div>
<script>
const RG={
  '北部':{'台北市':['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],'新北市':['板橋區','三重區','中和區','永和區','新莊區','新店區','淡水區','汐止區','土城區','蘆洲區','林口區','樹林區'],'基隆市':['仁愛區','信義區','中正區','中山區','安樂區','暖暖區'],'桃園市':['桃園區','中壢區','大溪區','楊梅區','蘆竹區','龜山區','八德區','龍潭區'],'新竹市':['東區','北區','香山區'],'新竹縣':['竹北市','竹東鎮','湖口鄉']},
  '中部':{'台中市':['中區','東區','南區','西區','北區','西屯區','南屯區','北屯區','豐原區','大里區','太平區','清水區','沙鹿區','烏日區','大雅區'],'苗栗縣':['苗栗市','頭份市','竹南鎮'],'彰化縣':['彰化市','員林市','溪湖鎮','鹿港鎮'],'南投縣':['南投市','草屯鎮','埔里鎮'],'雲林縣':['斗六市','虎尾鎮','西螺鎮']},
  '南部':{'台南市':['中西區','東區','南區','北區','安平區','安南區','永康區','歸仁區'],'高雄市':['楠梓區','左營區','鼓山區','三民區','苓雅區','前鎮區','鳳山區','大寮區','仁武區','岡山區'],'嘉義市':['東區','西區'],'嘉義縣':['太保市','朴子市','民雄鄉'],'屏東縣':['屏東市','潮州鎮','東港鎮']},
  '東部/離島':{'宜蘭縣':['宜蘭市','羅東鎮','礁溪鄉'],'花蓮縣':['花蓮市','吉安鄉'],'台東縣':['台東市','成功鎮'],'澎湖縣':['馬公市'],'金門縣':['金城鎮','金湖鎮']}
};

// 591 縣市 ID（買屋 regionid / 租屋 region，數字相同）
// 驗證來源：直接從搜尋結果 URL 讀取
const C591={
  '台北市':1,'基隆市':2,'新北市':3,'新竹市':4,'新竹縣':5,
  '桃園市':6,'台中市':8,'嘉義市':12,'苗栗縣':13,'彰化縣':14,
  '台南市':15,'南投縣':16,'雲林縣':18,'嘉義縣':20,'宜蘭縣':21,
  '高雄市':17,'屏東縣':19,'花蓮縣':23,'台東縣':24,'澎湖縣':25,'金門縣':26
};

let mode='rent',rP=30000,rPmin=0,rPmax=0,rT='all',bP=0,bPmin=0,bPmax=0,bT='all',aC='',aD=[],sC='',sD=[];

function setMode(m){
  mode=m;
  document.getElementById('tog-r').className='tog'+(m==='rent'?' ron':'');
  document.getElementById('tog-b').className='tog'+(m==='buy'?' bon':'');
  document.getElementById('suf1').textContent=m==='buy'?'萬':'元';
  document.getElementById('suf2').textContent=m==='buy'?'萬':'元';
  document.getElementById('pmin').value=m==='buy'?(bPmin||''):(rPmin||'');
  document.getElementById('pmax').value=m==='buy'?(bPmax||''):(rPmax||'');
  bldPC();bldTC();upd();
}
function bldPC(){
  const ib=mode==='buy';
  document.getElementById('price-title').textContent=ib?'💰 總價範圍（萬元）':'💰 租金範圍（元/月）';
  const opts=ib?[[0,'不限'],[500,'500萬以下'],[800,'800萬以下'],[1200,'1200萬以下'],[2000,'2000萬以下']]:[[0,'不限'],[10000,'一萬以下'],[15000,'一萬五以下'],[20000,'兩萬以下'],[30000,'三萬以下']];
  const cur=ib?bP:rP, hasC=ib?(bPmin||bPmax):(rPmin||rPmax);
  document.getElementById('price-chips').innerHTML=opts.map(([v,l])=>`<div class="chip${!hasC&&cur===v?(ib?' bon':' ron'):''}" onclick="${ib?'sBP':'sRP'}(${v})">${l}</div>`).join('');
}
function bldTC(){
  const ib=mode==='buy';
  document.getElementById('type-title').textContent=ib?'🏠 物件類型':'🏠 房屋類型';
  const opts=ib?[['all','全部'],['電梯大樓','電梯大樓'],['公寓','公寓'],['透天厝','透天厝']]:[['all','全部'],['整層住家','整層住家'],['獨立套房','獨立套房'],['雅房','雅房']];
  const cur=ib?bT:rT;
  document.getElementById('type-chips').innerHTML=opts.map(([v,l])=>`<div class="chip${cur===v?(ib?' bon':' ron'):''}" onclick="${ib?'sBT':'sRT'}('${v}')">${l}</div>`).join('');
}
function sRP(v){rP=v;rPmin=0;rPmax=0;document.getElementById('pmin').value='';document.getElementById('pmax').value='';bldPC();upd();}
function sBP(v){bP=v;bPmin=0;bPmax=0;document.getElementById('pmin').value='';document.getElementById('pmax').value='';bldPC();upd();}
function sRT(t){rT=t;bldTC();upd();}
function sBT(t){bT=t;bldTC();upd();}
function onCP(){
  const mn=parseInt(document.getElementById('pmin').value)||0;
  const mx=parseInt(document.getElementById('pmax').value)||0;
  if(mode==='rent'){rPmin=mn;rPmax=mx;if(mn||mx)rP=-1;}
  else{bPmin=mn;bPmax=mx;if(mn||mx)bP=-1;}
  bldPC();upd();
}
function getPL(){
  const ib=mode==='buy';
  if(ib){
    if(bPmin||bPmax)return`${bPmin?bPmin+'萬':'不限'}—${bPmax?bPmax+'萬':'不限'}`;
    return bP===0?'不限':bP+'萬以下';
  }else{
    if(rPmin||rPmax)return`${rPmin?'$'+rPmin.toLocaleString():'不限'}—${rPmax?'$'+rPmax.toLocaleString():'不限'}`;
    return rP===0?'不限':'$'+rP.toLocaleString()+'以下';
  }
}
function getTL(){const t=mode==='rent'?rT:bT;return t==='all'?'全部類型':t;}
function getRL(){if(!aC)return'全台灣';return aD.length?aC+'·'+aD.slice(0,2).join('、')+(aD.length>2?'…':''):aC;}

function upd(){
  const ib=mode==='buy';
  document.getElementById('sum-body').innerHTML=`
    <div class="sum-row"><span class="sk">${ib?'總價':'租金'}</span><span class="sv ${ib?'bl':'ac'}">${getPL()}</span></div>
    <div class="sum-row"><span class="sk">類型</span><span class="sv">${getTL()}</span></div>
    <div class="sum-row"><span class="sk">地區</span><span class="sv">${getRL()}</span></div>`;

  const rid=aC?C591[aC]:0;
  const tc=ib?'bl':'ac';
  const tags=[getPL(), getTL()!=='全部類型'?getTL():null, getRL()].filter(Boolean);

  // =========================================================
  // 591 租屋
  // URL格式：rent.591.com.tw/list?region=ID&kind=類型&rentprice=min,max
  // rentprice：元，min,max（不限用0）
  // kind：1=整層住家 2=獨立套房 3=雅房
  // =========================================================
  const rKind={'整層住家':'1','獨立套房':'2','雅房':'3'};
  let u591r='https://rent.591.com.tw/list?';
  const rp=[];
  if(rid) rp.push('region='+rid);
  const rMin=rPmin||(rP>0?0:0);
  const rMax=rPmax||(rP>0?rP:0);
  if(rMin||rMax) rp.push('rentprice='+rMin+','+rMax);
  if(rT!=='all'&&rKind[rT]) rp.push('kind='+rKind[rT]);
  u591r+=rp.join('&');

  // =========================================================
  // 591 買屋
  // URL格式：sale.591.com.tw/?regionid=ID&price=min_max&kind=類型
  // price：萬，底線分隔，例如 price=0_800
  // kind：8=公寓 9=電梯大樓 10=透天厝
  // =========================================================
  const bKind={'電梯大樓':'9','公寓':'8','透天厝':'10'};
  let u591b='https://sale.591.com.tw/?';
  const bp=[];
  if(rid) bp.push('regionid='+rid);
  const bMin=bPmin||(bP>0?0:0);
  const bMax=bPmax||(bP>0?bP:0);
  if(bMin||bMax) bp.push('price='+bMin+'_'+bMax);
  if(bT!=='all'&&bKind[bT]) bp.push('kind='+bKind[bT]);
  u591b+=bp.join('&');

  // =========================================================
  // 樂屋網
  // 租屋：rakuya.com.tw/rent/result?city=縣市&price_s=下限&price_e=上限（元）
  // 買屋：rakuya.com.tw/sell/result?city=縣市&price_s=下限&price_e=上限（元）
  // 注意：樂屋用的是縣市中文名稱，價格單位為元
  // =========================================================
  let uRakR='https://www.rakuya.com.tw/rent/result?';
  const rrp=[];
  if(aC) rrp.push('city='+encodeURIComponent(aC));
  const rrMin=rPmin||(rP>0?0:0);
  const rrMax=rPmax||(rP>0?rP:0);
  if(rrMin) rrp.push('price_s='+rrMin);
  if(rrMax) rrp.push('price_e='+rrMax);
  uRakR+=rrp.join('&');

  let uRakB='https://www.rakuya.com.tw/sell/result?';
  const rbp=[];
  if(aC) rbp.push('city='+encodeURIComponent(aC));
  const rbMin=bPmin||(bP>0?0:0);
  const rbMax=bPmax||(bP>0?bP:0);
  // 樂屋買屋價格單位為元，需 x10000
  if(rbMin) rbp.push('price_s='+(rbMin*10000));
  if(rbMax) rbp.push('price_e='+(rbMax*10000));

    {icon:'🔑',name:'永慶房屋',desc:'地區自動帶入，進入後請手動篩選售價',note:'⚠️ 請進入後手動篩選售價',badge:'買房',bc:'bb',url:uYcB},
    {icon:'🏠',name:'信義房屋',desc:'地區自動帶入，進入後請手動篩選售價',note:'⚠️ 請進入後手動篩選售價',badge:'買房',bc:'bb',url:uSyB},
    {icon:'🏘️',name:'好房網',desc:'地區自動帶入，進入後請手動篩選售價',note:'⚠️ 請進入後手動篩選售價',badge:'買房',bc:'bb',url:uHfB},

    {icon:'🔑',name:'永慶房屋',desc:'地區自動帶入，進入後請手動篩選租金',note:'⚠️ 請進入後手動篩選租金',badge:'租屋',bc:'br',url:uYcR},

function openS(){sC=aC;sD=[...aD];bldS();document.getElementById('sh').classList.add('open');document.getElementById('bd').classList.add('open');}
function closeS(){document.getElementById('sh').classList.remove('open');document.getElementById('bd').classList.remove('open');}
function clrR(){sC='';sD=[];bldS();}
function cfmR(){
  aC=sC;aD=[...sD];
  const btn=document.getElementById('rbtn'),nm=document.getElementById('rname'),sub=document.getElementById('rsub');
  if(!aC){nm.textContent='選擇縣市 / 行政區';nm.className='rname';sub.textContent='不選則搜尋全台灣';btn.classList.remove('has');}
  else{nm.textContent=aD.length?aC+' · '+aD.slice(0,3).join('、')+(aD.length>3?'…':''):aC;nm.className='rname has';sub.textContent=aD.length?`已選 ${aD.length} 個行政區`:'整個縣市';btn.classList.add('has');}
  closeS();upd();
}
function bldS(){
  let h='';
  for(const[r,cs]of Object.entries(RG)){
    h+=`<div class="rg"><div class="rgt">${r}</div><div class="cg">`;
    for(const c of Object.keys(cs))h+=`<div class="cb${sC===c?' sel':''}" onclick="selC('${c}')"><div class="cn">${c}</div><div class="cc">${c===sC&&sD.length?sD.length+'區':'全區'}</div></div>`;
    h+=`</div></div>`;
  }
  if(sC){const ds=Object.values(RG).flatMap(r=>r[sC]||[]);if(ds.length){h+=`<div class="ds"><div class="dt">${sC} 行政區（可多選，不選代表全區）</div><div class="dg">${ds.map(d=>`<div class="db${sD.includes(d)?' sel':''}" onclick="togD('${d}')">${d}</div>`).join('')}</div></div>`;}}
  document.getElementById('sbd').innerHTML=h;
}
function selC(c){sC=sC===c?'':c;sD=[];bldS();setTimeout(()=>{const ds=document.querySelector('.ds');if(ds)ds.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function togD(d){const i=sD.indexOf(d);i===-1?sD.push(d):sD.splice(i,1);bldS();}

bldPC();bldTC();upd();
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="低價找房">
<title>低價找房</title>
<style>
:root{--bg:#0d1b2a;--s:#162436;--s2:#1e3048;--bd:#2a3f55;--ac:#f0a500;--tx:#e8e2d8;--mu:#6a7f92;--cd:#172538}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden}
.hd{flex-shrink:0;background:var(--bg);padding:calc(env(safe-area-inset-top,44px) + 4px) 16px 12px}
.hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:1.2rem;font-weight:700;letter-spacing:.05em}
.logo em{color:var(--ac);font-style:normal}
.badge{font-size:.7rem;color:var(--mu);background:var(--s);padding:4px 10px;border-radius:20px;border:1px solid var(--bd)}
.badge b{color:var(--ac)}
.sb{display:flex;align-items:center;gap:8px;background:var(--s);border:1.5px solid var(--bd);border-radius:10px;padding:0 12px}
.sb:focus-within{border-color:var(--ac)}
.sb input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:.88rem;padding:11px 0}
.sb input::placeholder{color:var(--mu)}
.fbar{flex-shrink:0;border-bottom:1px solid var(--bd)}
.fr{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s);color:var(--mu);font-size:.74rem;cursor:pointer}
.chip.on{background:var(--ac);color:#0d1b2a;border-color:var(--ac);font-weight:700}
.chip.sel{border-color:var(--ac);color:var(--ac);background:rgba(240,165,0,.1)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom,20px) + 70px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);margin-bottom:12px}
.stat{background:var(--s);padding:10px 4px;text-align:center}
.sn{font-size:1rem;font-weight:700;color:var(--ac);margin-bottom:2px}
.sl{font-size:.58rem;color:var(--mu)}
.sec{font-size:.67rem;color:var(--mu);letter-spacing:.08em;padding:0 14px;margin-bottom:8px}
.prow{display:flex;gap:7px;padding:0 14px 12px;overflow-x:auto;scrollbar-width:none}
.prow::-webkit-scrollbar{display:none}
.pc{white-space:nowrap;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;font-size:.74rem;color:var(--tx);text-decoration:none}
.cards{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--cd);border:1px solid var(--bd);border-radius:12px;overflow:hidden;animation:up .25s ease both}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cm{display:flex}
.th{width:78px;min-height:84px;background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex-shrink:0}
.th .em{font-size:1.6rem}
.th .tl{font-size:.56rem;color:var(--mu)}
.ci{flex:1;padding:10px 12px;min-width:0}
.pr{display:flex;align-items:baseline;gap:3px;margin-bottom:3px}
.price{font-size:1.15rem;font-weight:700;color:var(--ac)}
.pu{font-size:.66rem;color:var(--mu)}
.addr{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.meta{display:flex;gap:7px;font-size:.66rem;color:var(--mu)}
.cf{border-top:1px solid var(--bd);padding:6px 12px;display:flex;align-items:center;justify-content:space-between}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:2px 6px;font-size:.61rem;color:var(--mu)}
.go{font-size:.68rem;color:var(--ac);text-decoration:none;font-weight:500}
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.empty .ei{font-size:2.5rem;margin-bottom:8px}
.more{margin:12px 14px;padding:12px;background:var(--s);border:1px solid var(--bd);border-radius:10px;text-align:center;font-size:.8rem;color:var(--mu);cursor:pointer}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(13,27,42,.96);backdrop-filter:blur(12px);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,20px);z-index:50}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;cursor:pointer;color:var(--mu);font-size:.58rem}
.bni.on{color:var(--ac)}
.bni .ni{font-size:1.15rem}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.backdrop.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;z-index:101;transform:translateX(-50%) translateY(105%);width:100%;max-width:430px;background:var(--s);border-radius:18px 18px 0 0;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:80dvh;display:flex;flex-direction:column}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sh{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.shd{padding:12px 18px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shd h2{font-size:.95rem;font-weight:700}
.shd p{font-size:.7rem;color:var(--mu);margin-top:2px}
.sbd{overflow-y:auto;flex:1;padding:14px 16px}
.sft{padding:10px 16px;padding-bottom:calc(env(safe-area-inset-bottom,20px) + 10px);border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--s);flex-shrink:0}
.bclr{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);font-size:.85rem;cursor:pointer}
.bok{flex:2;padding:12px;border-radius:10px;border:none;background:var(--ac);color:#0d1b2a;font-size:.85rem;font-weight:700;cursor:pointer}
.rg{margin-bottom:16px}
.rgt{font-size:.62rem;color:var(--mu);letter-spacing:.1em;font-weight:600;margin-bottom:8px;text-transform:uppercase}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cb{background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
.cb.sel{background:rgba(240,165,0,.12);border-color:var(--ac)}
.cn{font-size:.78rem;color:var(--tx);font-weight:500;margin-bottom:1px}
.cc{font-size:.58rem;color:var(--mu)}
.cb.sel .cn{color:var(--ac)}
.ds{border-top:1px solid var(--bd);padding-top:12px;margin-top:4px}
.dt{font-size:.62rem;color:var(--mu);letter-spacing:.08em;margin-bottom:8px}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.db{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 2px;font-size:.68rem;color:var(--mu);text-align:center;cursor:pointer}
.db.sel{background:rgba(240,165,0,.12);border-color:var(--ac);color:var(--ac);font-weight:500}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <div class="hd-row">
    <div class="logo">低價<em>找房</em></div>
    <div class="badge">找到 <b id="sc">0</b> 筆</div>
  </div>
  <div class="sb">
    <span style="color:var(--mu)">🔍</span>
    <input type="search" id="inp" placeholder="搜尋路名、捷運站、行政區…" oninput="onI(this)">
  </div>
</div>
<div class="fbar">
  <div class="fr">
    <div class="chip" id="rc" onclick="openS()">📍 <span id="rt">選擇地區</span> ▾</div>
    <div class="chip on" id="p30" onclick="setP(30000)">三萬以下</div>
    <div class="chip" id="p20" onclick="setP(20000)">兩萬以下</div>
    <div class="chip" id="p15" onclick="setP(15000)">一萬五以下</div>
    <div class="chip" id="p10" onclick="setP(10000)">一萬以下</div>
  </div>
  <div class="fr" style="padding-top:0;padding-bottom:8px">
    <div class="chip on" id="ta" onclick="setT('all')">全部房型</div>
    <div class="chip" id="t1" onclick="setT('整層住家')">🏠 整層住家</div>
    <div class="chip" id="t2" onclick="setT('獨立套房')">🛋 套房</div>
    <div class="chip" id="t3" onclick="setT('雅房')">🛏 雅房</div>
  </div>
</div>
<div class="scroll">
  <div class="stats">
    <div class="stat"><div class="sn" id="s1">—</div><div class="sl">物件數</div></div>
    <div class="stat"><div class="sn" id="s2">—</div><div class="sl">平均租金</div></div>
    <div class="stat"><div class="sn" id="s3">—</div><div class="sl">最低租金</div></div>
    <div class="stat"><div class="sn" id="s4">—</div><div class="sl">縣市數</div></div>
  </div>
  <div class="sec">即時租屋平台</div>
  <div class="prow">
    <a class="pc" href="https://rent.591.com.tw/?price=0,30000" target="_blank">🏠 591租屋</a>
    <a class="pc" href="https://www.rakuya.com.tw/rent/result?price_s=0&price_e=30000" target="_blank">🏡 樂屋網</a>
    <a class="pc" href="https://www.housefun.com.tw/rent" target="_blank">🔑 好房網</a>
    <a class="pc" href="https://lvr.land.moi.gov.tw/" target="_blank">📋 實價登錄</a>
  </div>
  <div class="sec">篩選結果</div>
  <div class="cards" id="cards"></div>
  <div id="mw"></div>
</div>
</div>
<div class="bnav">
  <div class="bni on"><div class="ni">🏘️</div>找房</div>
  <div class="bni" onclick="alert('即將上線')"><div class="ni">🗺️</div>地圖</div>
  <div class="bni" onclick="alert('即將上線')"><div class="ni">🔖</div>收藏</div>
  <div class="bni" onclick="alert('即將上線')"><div class="ni">📊</div>行情</div>
</div>
<div class="backdrop" id="bd" onclick="closeS()"></div>
<div class="sheet" id="sh">
  <div class="sh"></div>
  <div class="shd"><h2>選擇縣市 / 行政區</h2><p>先點縣市，再選行政區（可多選）</p></div>
  <div class="sbd" id="sbd"></div>
  <div class="sft">
    <button class="bclr" onclick="clrR()">清除</button>
    <button class="bok" onclick="cfmR()">確認篩選</button>
  </div>
</div>
<script>
const RG={
 '北部':{'台北市':['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],'新北市':['板橋區','三重區','中和區','永和區','新莊區','新店區','淡水區','汐止區','土城區','蘆洲區','林口區','樹林區'],'基隆市':['仁愛區','信義區','中正區','中山區','安樂區','暖暖區'],'桃園市':['桃園區','中壢區','大溪區','楊梅區','蘆竹區','龜山區','八德區','龍潭區'],'新竹市':['東區','北區','香山區'],'新竹縣':['竹北市','竹東鎮','新埔鎮','湖口鄉']},
 '中部':{'台中市':['中區','東區','南區','西區','北區','西屯區','南屯區','北屯區','豐原區','大里區','太平區','清水區','沙鹿區','烏日區','大雅區'],'苗栗縣':['苗栗市','頭份市','竹南鎮','通霄鎮'],'彰化縣':['彰化市','員林市','溪湖鎮','和美鎮','鹿港鎮'],'南投縣':['南投市','草屯鎮','埔里鎮','竹山鎮'],'雲林縣':['斗六市','虎尾鎮','斗南鎮','西螺鎮']},
 '南部':{'台南市':['中西區','東區','南區','北區','安平區','安南區','永康區','歸仁區','仁德區'],'高雄市':['楠梓區','左營區','鼓山區','三民區','苓雅區','前鎮區','鳳山區','大寮區','仁武區','岡山區'],'嘉義市':['東區','西區'],'嘉義縣':['太保市','朴子市','民雄鄉'],'屏東縣':['屏東市','潮州鎮','東港鎮','恆春鎮']},
 '東部/離島':{'宜蘭縣':['宜蘭市','羅東鎮','蘇澳鎮','礁溪鄉'],'花蓮縣':['花蓮市','吉安鄉','壽豐鄉'],'台東縣':['台東市','成功鎮','關山鎮'],'澎湖縣':['馬公市','湖西鄉'],'金門縣':['金城鎮','金湖鎮']}
};
const D=[
 {city:'台北市',dist:'文山區',addr:'木柵路二段',type:'整層住家',price:28000,size:20,rooms:'2房1廳',floor:'3/5F',tags:['近捷運','寵物OK']},
 {city:'台北市',dist:'萬華區',addr:'西藏路',type:'雅房',price:7500,size:5,rooms:'雅房',floor:'3/5F',tags:['免仲介','近西門']},
 {city:'台北市',dist:'中山區',addr:'林森北路',type:'獨立套房',price:18500,size:9,rooms:'套房',floor:'5/9F',tags:['近捷運','含管理費']},
 {city:'台北市',dist:'大安區',addr:'和平東路',type:'獨立套房',price:22000,size:11,rooms:'套房',floor:'4/8F',tags:['近捷運','新裝潢']},
 {city:'台北市',dist:'內湖區',addr:'成功路四段',type:'整層住家',price:29000,size:28,rooms:'3房1廳',floor:'7/12F',tags:['有電梯','近科學園區']},
 {city:'新北市',dist:'板橋區',addr:'文化路一段',type:'整層住家',price:22000,size:16,rooms:'1房1廳',floor:'2/8F',tags:['近捷運','洗衣機']},
 {city:'新北市',dist:'中和區',addr:'中山路三段',type:'獨立套房',price:13500,size:12,rooms:'套房',floor:'7/14F',tags:['近捷運','含寬頻']},
 {city:'新北市',dist:'淡水區',addr:'英專路',type:'整層住家',price:26000,size:32,rooms:'3房2廳',floor:'6/10F',tags:['捷運淡水','海景']},
 {city:'基隆市',dist:'仁愛區',addr:'愛一路',type:'整層住家',price:15000,size:22,rooms:'2房2廳',floor:'1/3F',tags:['有車位','安靜']},
 {city:'桃園市',dist:'中壢區',addr:'中山路',type:'整層住家',price:16000,size:18,rooms:'2房1廳',floor:'6/12F',tags:['近捷運','新裝潢']},
 {city:'桃園市',dist:'蘆竹區',addr:'南崁路',type:'整層住家',price:19000,size:28,rooms:'3房1廳',floor:'2/4F',tags:['近機場','有停車']},
 {city:'新竹市',dist:'東區',addr:'光復路',type:'整層住家',price:20000,size:20,rooms:'2房1廳',floor:'3/5F',tags:['近清大','管理員']},
 {city:'台中市',dist:'西屯區',addr:'逢甲路',type:'獨立套房',price:12000,size:10,rooms:'套房',floor:'4/7F',tags:['近大學','家電齊全']},
 {city:'台中市',dist:'北區',addr:'錦新街',type:'雅房',price:6000,size:6,rooms:'雅房',floor:'2/4F',tags:['近中國醫','含網路']},
 {city:'台中市',dist:'北屯區',addr:'昌平路',type:'整層住家',price:18000,size:24,rooms:'2房1廳',floor:'4/12F',tags:['有電梯','格局佳']},
 {city:'台南市',dist:'東區',addr:'長榮路二段',type:'獨立套房',price:9800,size:8,rooms:'套房',floor:'2/4F',tags:['含水電','近成大']},
 {city:'台南市',dist:'安平區',addr:'安平路',type:'整層住家',price:14000,size:17,rooms:'1房1廳',floor:'4/6F',tags:['近古蹟','有陽台']},
 {city:'高雄市',dist:'三民區',addr:'建興路',type:'整層住家',price:18000,size:25,rooms:'3房1廳',floor:'5/11F',tags:['有電梯','近市場']},
 {city:'高雄市',dist:'左營區',addr:'博愛二路',type:'整層住家',price:25000,size:30,rooms:'3房2廳',floor:'8/15F',tags:['近捷運','全新裝潢']},
 {city:'高雄市',dist:'鳳山區',addr:'中正路',type:'雅房',price:5500,size:5,rooms:'雅房',floor:'3/3F',tags:['近火車站','免仲介']},
 {city:'宜蘭縣',dist:'宜蘭市',addr:'民族路',type:'整層住家',price:14000,size:26,rooms:'3房1廳',floor:'2/3F',tags:['獨立庭院','近車站']},
 {city:'花蓮縣',dist:'花蓮市',addr:'中正路',type:'整層住家',price:12000,size:30,rooms:'3房1廳',floor:'1/2F',tags:['附停車','清幽']},
 {city:'嘉義市',dist:'東區',addr:'中山路',type:'獨立套房',price:8000,size:9,rooms:'套房',floor:'3/5F',tags:['近嘉大','含冷氣']},
 {city:'屏東縣',dist:'屏東市',addr:'自由路',type:'整層住家',price:11000,size:24,rooms:'2房1廳',floor:'2/4F',tags:['近市區','格局方正']},
 {city:'彰化縣',dist:'彰化市',addr:'中正路一段',type:'獨立套房',price:7000,size:8,rooms:'套房',floor:'4/6F',tags:['含水費','近彰師大']},
 {city:'雲林縣',dist:'斗六市',addr:'大學路',type:'雅房',price:4500,size:5,rooms:'雅房',floor:'2/3F',tags:['近雲科大','免仲介']},
 {city:'台東縣',dist:'台東市',addr:'中正路',type:'整層住家',price:9000,size:30,rooms:'3房1廳',floor:'1/2F',tags:['近海','空間大']},
 {city:'苗栗縣',dist:'苗栗市',addr:'府前路',type:'整層住家',price:13000,size:22,rooms:'2房1廳',floor:'1/4F',tags:['有車位','環境佳']}
];
const EM={'整層住家':'🏠','獨立套房':'🛋️','雅房':'🛏️'};
let fP=30000,fT='all',fK='',sC='',sD=[],aC='',aD=[],pg=1;
const PP=10;
function fil(){return D.filter(d=>{if(d.price>fP)return false;if(fT!=='all'&&d.type!==fT)return false;if(aC&&d.city!==aC)return false;if(aD.length&&!aD.includes(d.dist))return false;if(fK&&!(d.city+d.dist+d.addr+d.tags.join('')).toLowerCase().includes(fK))return false;return true});}
function render(){
 const data=fil(),total=data.length,prices=data.map(d=>d.price);
 const avg=total?Math.round(prices.reduce((a,b)=>a+b,0)/total):0;
 const min=total?Math.min(...prices):0;
 const cities=[...new Set(data.map(d=>d.city))].length;
 document.getElementById('sc').textContent=total;
 document.getElementById('s1').textContent=total||'—';
 document.getElementById('s2').textContent=avg?`$${(avg/1000).toFixed(1)}k`:'—';
 document.getElementById('s3').textContent=min?`$${(min/1000).toFixed(1)}k`:'—';
 document.getElementById('s4').textContent=cities||'—';
 const paged=data.slice(0,pg*PP),el=document.getElementById('cards');
 if(!paged.length){el.innerHTML='<div class="empty"><div class="ei">🔍</div><p>找不到符合條件的物件</p></div>';document.getElementById('mw').innerHTML='';return;}
 el.innerHTML=paged.map((d,i)=>`<div class="card" style="animation-delay:${(i%PP)*.04}s"><div class="cm"><div class="th"><div class="em">${EM[d.type]||'🏘️'}</div><div class="tl">${d.type}</div></div><div class="ci"><div class="pr"><span class="price">$${d.price.toLocaleString()}</span><span class="pu">/月</span></div><div class="addr">${d.city} ${d.dist} ${d.addr}</div><div class="meta"><span>🏢${d.floor}</span><span>📐${d.size}坪</span><span>🛏${d.rooms}</span></div></div></div><div class="cf"><div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><a class="go" href="https://rent.591.com.tw/?keyword=${encodeURIComponent(d.city+d.dist)}&price=0,${fP}" target="_blank">找類似 →</a></div></div>`).join('');
 const mw=document.getElementById('mw');
 mw.innerHTML=paged.length<total?`<div class="more" onclick="pg++;render()">載入更多（還有 ${total-paged.length} 筆）</div>`:`<div style="text-align:center;padding:16px;font-size:.7rem;color:var(--mu)">— 已顯示全部 ${total} 筆 —</div>`;
}
function setP(p){fP=p;pg=1;['p30','p20','p15','p10'].forEach(id=>document.getElementById(id).classList.remove('on'));document.getElementById('p'+p).classList.add('on');render();}
function setT(t){fT=t;pg=1;['ta','t1','t2','t3'].forEach(id=>document.getElementById(id).classList.remove('on'));document.getElementById(t==='all'?'ta':t==='整層住家'?'t1':t==='獨立套房'?'t2':'t3').classList.add('on');render();}
function onI(el){fK=el.value.trim().toLowerCase();pg=1;render();}
function openS(){sC=aC;sD=[...aD];bldS();document.getElementById('sh').classList.add('open');document.getElementById('bd').classList.add('open');}
function closeS(){document.getElementById('sh').classList.remove('open');document.getElementById('bd').classList.remove('open');}
function clrR(){sC='';sD=[];bldS();}
function cfmR(){aC=sC;aD=[...sD];pg=1;const rc=document.getElementById('rc'),rt=document.getElementById('rt');if(!aC){rt.textContent='選擇地區';rc.classList.remove('sel');}else if(!aD.length){rt.textContent=aC;rc.classList.add('sel');}else{rt.textContent=`${aC}·${aD.length}區`;rc.classList.add('sel');}closeS();render();}
function bldS(){
 const bd=document.getElementById('sbd'),cnt=c=>D.filter(d=>d.city===c&&d.price<=fP).length;
 let h='';
 for(const[r,cs]of Object.entries(RG)){h+=`<div class="rg"><div class="rgt">${r}</div><div class="cg">`;for(const c of Object.keys(cs)){h+=`<div class="cb${sC===c?' sel':''}" onclick="selC('${c}')"><div class="cn">${c}</div><div class="cc">${cnt(c)}筆</div></div>`;}h+=`</div></div>`;}
 if(sC){const ds=Object.values(RG).flatMap(r=>r[sC]||[]);if(ds.length){h+=`<div class="ds"><div class="dt">${sC} 行政區（可多選）</div><div class="dg">`;ds.forEach(d=>{h+=`<div class="db${sD.includes(d)?' sel':''}" onclick="togD('${d}')">${d}</div>`;});h+=`</div></div>`;}}
 bd.innerHTML=h;
}
function selC(c){sC=sC===c?'':c;sD=[];bldS();setTimeout(()=>{const ds=document.querySelector('.ds');if(ds)ds.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function togD(d){const i=sD.indexOf(d);i===-1?sD.push(d):sD.splice(i,1);bldS();}
render();
</script>
</body>
</html>
